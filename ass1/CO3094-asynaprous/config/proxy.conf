#
# config/proxy.conf
#
# Port mapping theo spec:
#   8080 = proxy          (entry point)
#   9000 = backend        (static files + auth)
#   2026 = tracker        (sampleapp chính - login, submit-info, get-list...)
#   2027 = peer 1         (peer instance 1)
#   2028 = peer 2         (peer instance 2)
#


# ─────────────────────────────────────────────────────
# 1. Backend — static files + auth
#    Public  : GET /  /index.html  /login.html
#    Protected (cần auth): các route còn lại
#
#    Khách gõ: http://192.168.56.114:8080/
#    Proxy chuyển tới: backend port 9000
# ─────────────────────────────────────────────────────
host "192.168.56.114:8080" {
    proxy_pass http://192.168.56.114:9000;
}


# ─────────────────────────────────────────────────────
# 2. Tracker / SampleApp chính — chat app
#    Các route trả JSON (KHÔNG phải HTML):
#      POST /login
#      POST /submit-info
#      GET  /get-list
#      POST /add-list
#      POST /connect-peer
#      POST /send-peer
#      POST /broadcast-peer
#
#    Khách gõ: http://tracker.local:8080/
#    Proxy chuyển tới: sampleapp port 2026
# ─────────────────────────────────────────────────────
host "tracker.local" {
    proxy_pass http://192.168.56.114:2026;
}


# ─────────────────────────────────────────────────────
# 3. Peer instances — round-robin
#    Peer 1: port 2027
#    Peer 2: port 2028
#    Xoay vòng: request 1→2027, request 2→2028, request 3→2027...
#
#    Khách gõ: http://peer.local:8080/
#    Proxy xoay vòng giữa peer 2027 và 2028
# ─────────────────────────────────────────────────────
host "peer.local" {
    proxy_set_header Host $host;

    proxy_pass http://192.168.56.114:2027;
    proxy_pass http://192.168.56.114:2028;

    dist_policy round-robin
}
