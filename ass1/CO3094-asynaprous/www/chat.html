<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HCMUT P2P Chat - Member E Demo</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .box { background: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ddd; }
        #chat-history { height: 150px; border: 1px solid #ccc; overflow-y: auto; background: #eee; padding: 10px; }
        .btn { padding: 5px 10px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Milestone 1: P2P Chat Demo</h1>

    <div class="box">
        <h3>1. Authentication (/login)</h3>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button class="btn" onclick="doAction('/login', 'POST', {u: user.value, p: pass.value})">Login</button>
        <button class="btn" onclick="doAction('/submit-info', 'POST', {info: 'Active'})">Submit Info</button>
    </div>

    <div class="box">
        <h3>2. Peer Discovery (/get-list)</h3>
        <button class="btn" onclick="doAction('/get-list', 'GET')">Refresh Peer List</button>
        <ul id="peer-list"></ul>
    </div>

    <div class="box">
        <h3>3. Messaging (/send-peer)</h3>
        <div id="chat-history"></div>
        <input type="text" id="target" placeholder="Target Peer ID">
        <input type="text" id="msg" placeholder="Message content">
        <button class="btn" onclick="doAction('/connect-peer', 'POST', {id: target.value})">Connect</button>
        <button class="btn" onclick="doAction('/send-peer', 'POST', {id: target.value, m: msg.value})">Send</button>
    </div>

    <div class="box" style="background: #333; color: #0f0;">
        <strong>Console Output:</strong>
        <pre id="console">Ready...</pre>
    </div>

    <script>
        async function doAction(endpoint, method, bodyData = null) {
            const consoleEl = document.getElementById('console');
            try {
                // IMPORTANT: We use relative paths so the PROXY handles the routing
                const options = {
                    method: method,
                    headers: { 'Content-Type': 'application/json' }
                };
                if (bodyData && method !== 'GET') options.body = JSON.stringify(bodyData);

                const response = await fetch(endpoint, options);
                const data = await response.text();
                
                consoleEl.textContent = `[${endpoint}] Response: ${data}`;
                
                if (endpoint === '/send-peer') {
                    document.getElementById('chat-history').innerHTML += `<div><b>You:</b> ${bodyData.m}</div>`;
                }
            } catch (err) {
                consoleEl.textContent = `Error: ${err.message}`;
            }
        }
    </script>
</body>
</html>
